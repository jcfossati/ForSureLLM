services:
  forsurellm-api:
    build:
      context: ..
      dockerfile: api/Dockerfile
      args:
        MODEL_VARIANT: ${MODEL_VARIANT:-pruned}  # pruned | full
    image: forsurellm-api:${MODEL_VARIANT:-pruned}
    ports:
      - "${API_PORT:-8000}:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=3); sys.exit(0 if r.status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M    # pruned ~85 MB process / full ~440 MB process
